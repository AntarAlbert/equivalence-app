services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: equivalence_php
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      DATABASE_URL: "mysql://root:root@mysql:3306/equivalence?serverVersion=8.0"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: equivalence_nginx
    ports:
      - "8082:80"
    volumes:
      - ./:/var/www:ro
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: equivalence_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: equivalence
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # redis:
  #   image: redis:alpine
  #   container_name: equivalence_redis

  # rabbitmq:
  #   image: rabbitmq:management
  #   container_name: equivalence_rabbitmq
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"

  adminer:
    image: adminer:latest
    container_name: equivalence_adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql
    restart: unless-stopped

volumes:
  db_data: